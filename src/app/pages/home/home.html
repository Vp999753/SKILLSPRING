<h1>{{ portalName }}</h1>

<p>{{ initMessage }}</p>

<p>
  Manage your courses, view your profile and track academic progress.
</p>

<p><b>Courses Available:</b> {{ availableCourses }}</p>
<p><b>Enrolled:</b> 3</p>
<p><b>GPA:</b> 3.8</p>

<br>

<button [disabled]="!isPortalActive" (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<br>

<input
  type="text"
  placeholder="Search courses"
  [(ngModel)]="searchTerm"
/>

<p>Searching for: {{ searchTerm }}</p>
